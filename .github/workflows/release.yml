name: Release

on:
  push:
    branches:
      - main

jobs:

  # Release unpublished packages.
  release-plz-release:
    if: ${{ github.repository_owner == 'cnieg' }}
    name: Release-plz release
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:

      - name: Show toolchain version
        run: rustup show active-toolchain -v

      - &checkout
        name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Run Clippy
        run: cargo clippy --no-deps -- -Dwarnings

      - name: Run rustfmt
        run: cargo fmt --check

      - name: Run rustdoc
        run: cargo doc --no-deps
        env:
          RUSTDOCFLAGS: "-D warnings"

      - name: Run tests
        run: cargo test

      - name: Run release-plz
        id: release-plz
        uses: release-plz/action@2eb1d8bcb770b4c48ccfaad919734b38b51958c9 # v0.5.131
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Get release version
        if: ${{ steps.release-plz.outputs.releases != '[]' }}
        id: release-version
        env:
          RELEASES: ${{ steps.release-plz.outputs.releases }}
        run: echo version=$(echo "$RELEASES" | jq -r '. | last .version') >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        if: ${{ steps.release-plz.outputs.releases != '[]' }}
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Login to Docker Hub
        if: ${{ steps.release-plz.outputs.releases != '[]' }}
        uses: docker/login-action@06fb636fac595d6fb4b28a5dfcb21a6f5091859c # v4.5.0
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push OCI image
        if: ${{ steps.release-plz.outputs.releases != '[]' }}
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          platforms: linux/amd64,linux/arm64
          push: true
          tags: cnieg/gitlab-tokens-exporter:${{ steps.release-version.outputs.version }},cnieg/gitlab-tokens-exporter:latest

      - name: Docker Hub Description
        if: ${{ steps.release-plz.outputs.releases != '[]' }}
        uses: peter-evans/dockerhub-description@1b9a80c056b620d92cedb9d9b5a223409c68ddfa # v5.0.0
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
          repository: cnieg/gitlab-tokens-exporter
          readme-filepath: ./README_dockerhub.md
          short-description: ${{ github.event.repository.description }}

  # Create a PR with the new versions and changelog, preparing the next release.
  release-plz-pr:
    if: ${{ github.repository_owner == 'cnieg' }}
    name: Release-plz PR
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      pull-requests: write
    concurrency:
      group: release-plz-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - *checkout
      - name: Run release-plz
        uses: release-plz/action@2eb1d8bcb770b4c48ccfaad919734b38b51958c9 # v0.5.131
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
